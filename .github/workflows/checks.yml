name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate project files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate HTML
        run: html-validate public/index.html

      - name: Check architects.js exists and is non-empty
        run: |
          python3 - <<'EOF'
          import os, sys
          path = 'src/architects.js'
          if not os.path.exists(path):
              print(f'ERROR: {path} does not exist')
              sys.exit(1)
          size = os.path.getsize(path)
          if size < 100:
              print(f'ERROR: {path} looks too small ({size} bytes) — expected at least 100 bytes')
              sys.exit(1)
          print(f'OK: {path} exists and is {size} bytes')
          EOF

      - name: Warn on TODO/PLACEHOLDER strings in HTML
        run: |
          if grep -i 'TODO\|PLACEHOLDER' public/index.html; then
            echo "WARNING: TODO or PLACEHOLDER strings found in public/index.html — review before deploying"
          else
            echo "OK: no TODO/PLACEHOLDER strings found in public/index.html"
          fi
